<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Library Management System</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar Navigation -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h2>📚 LibManage</h2>
            </div>
            <nav class="sidebar-nav">
                <button class="nav-btn active" data-target="books-view">Books</button>
                <button class="nav-btn" data-target="members-view">Members</button>
                <button class="nav-btn" data-target="issues-view">Issues & Returns</button>
            </nav>
        </aside>

        <!-- Main Content Area -->
        <main class="main-content">
            <!-- Books View -->
            <section id="books-view" class="view-section active">
                <header class="section-header">
                    <h1>Books Inventory</h1>
                    <button class="primary-btn" onclick="openModal('bookModal')">+ Add Book</button>
                </header>
                <div class="table-container">
                    <table class="data-table" id="booksTable">
                        <thead>
                            <tr>
                                <th>Book ID</th>
                                <th>Title</th>
                                <th>Author</th>
                                <th>ISBN</th>
                                <th>Available</th>
                                <th>Total</th>
                            </tr>
                        </thead>
                        <tbody>
                            <!-- Books injected via JS -->
                        </tbody>
                    </table>
                </div>
            </section>

            <!-- Members View -->
            <section id="members-view" class="view-section">
                <header class="section-header">
                    <h1>Library Members</h1>
                    <button class="primary-btn" onclick="openModal('memberModal')">+ Add Member</button>
                </header>
                <div class="table-container">
                    <table class="data-table" id="membersTable">
                        <thead>
                            <tr>
                                <th>Member ID</th>
                                <th>Name</th>
                                <th>Email</th>
                                <th>Phone</th>
                            </tr>
                        </thead>
                        <tbody>
                            <!-- Members injected via JS -->
                        </tbody>
                    </table>
                </div>
            </section>

            <!-- Issues View -->
            <section id="issues-view" class="view-section">
                <header class="section-header">
                    <h1>Issue & Return Books</h1>
                    <button class="primary-btn" onclick="openModal('issueModal')">Issue a Book</button>
                </header>
                
                <div class="search-member-box">
                    <label>View records for member ID:</label>
                    <div class="search-row">
                        <input type="number" id="searchMemberId" placeholder="Enter Member ID (e.g., 1)">
                        <button class="secondary-btn" onclick="fetchIssues()">Search</button>
                    </div>
                </div>

                <div class="table-container">
                    <table class="data-table" id="issuesTable">
                        <thead>
                            <tr>
                                <th>Transaction ID</th>
                                <th>Book Title</th>
                                <th>Issue Date</th>
                                <th>Due Date</th>
                                <th>Return Date</th>
                                <th>Status</th>
                                <th>Action</th>
                            </tr>
                        </thead>
                        <tbody>
                            <!-- Issue records injected via JS -->
                        </tbody>
                    </table>
                </div>
            </section>
        </main>
    </div>

    <!-- Modals -->
    <!-- Add Book Modal -->
    <div class="modal-overlay" id="bookModal">
        <div class="modal">
            <div class="modal-header">
                <h3>Add New Book</h3>
                <button class="close-btn" onclick="closeModal('bookModal')">&times;</button>
            </div>
            <form id="bookForm" onsubmit="addBook(event)">
                <div class="form-group">
                    <label>Title</label>
                    <input type="text" id="bookTitle" required>
                </div>
                <div class="form-group">
                    <label>Author</label>
                    <input type="text" id="bookAuthor" required>
                </div>
                <div class="form-group">
                    <label>ISBN</label>
                    <input type="text" id="bookIsbn" required>
                </div>
                <div class="form-group row">
                    <div class="half-width">
                        <label>Available Copies</label>
                        <input type="number" id="bookAvailable" required>
                    </div>
                    <div class="half-width">
                        <label>Total Copies</label>
                        <input type="number" id="bookTotal" required>
                    </div>
                </div>
                <button type="submit" class="submit-btn">Save Book</button>
            </form>
        </div>
    </div>

    <!-- Add Member Modal -->
    <div class="modal-overlay" id="memberModal">
        <div class="modal">
            <div class="modal-header">
                <h3>Add New Member</h3>
                <button class="close-btn" onclick="closeModal('memberModal')">&times;</button>
            </div>
            <form id="memberForm" onsubmit="addMember(event)">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" id="memberName" required>
                </div>
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="memberEmail" required>
                </div>
                <div class="form-group">
                    <label>Phone Number</label>
                    <input type="text" id="memberPhone" required>
                </div>
                <button type="submit" class="submit-btn">Save Member</button>
            </form>
        </div>
    </div>

    <!-- Issue Book Modal -->
    <div class="modal-overlay" id="issueModal">
        <div class="modal">
            <div class="modal-header">
                <h3>Issue Book</h3>
                <button class="close-btn" onclick="closeModal('issueModal')">&times;</button>
            </div>
            <form id="issueForm" onsubmit="issueBook(event)">
                <div class="form-group">
                    <label>Book ID to Issue</label>
                    <input type="number" id="issueBookId" placeholder="Enter Book ID (find from Books tab)" required>
                </div>
                <div class="form-group">
                    <label>Member ID receiving book</label>
                    <input type="number" id="issueMemberId" placeholder="Enter Member ID (find from Members tab)" required>
                </div>
                <button type="submit" class="submit-btn">Complete Issue</button>
            </form>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
